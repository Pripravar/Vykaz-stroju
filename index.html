<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#1a1a2e; --panel:#16213e; --panel2:#0f3460;
  --accent:#e94560; --accent2:#f5a623;
  --text:#eaeaea; --text2:#a0aec0;
  --green:#48bb78; --red:#e94560; --border:rgba(255,255,255,0.10);
  --radius:12px;
}
html, body { width:100%; min-height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  font-size:15px; line-height:1.4;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
header {
  background:var(--panel); border-bottom:1px solid var(--border);
  padding:12px 14px; display:flex; align-items:center; gap:10px;
  position:sticky; top:0; z-index:100;
}
header h1 { font-size:16px; font-weight:700; flex:1; }
header h1 .accent { color:var(--accent); }
header button {
  background:var(--panel2); border:1px solid var(--border); border-radius:8px;
  color:var(--text); padding:8px 10px; font-size:14px; cursor:pointer;
}
.btn-back { background:none !important; border:none !important; font-size:22px; padding:4px 6px; }

main { padding:14px; max-width:820px; margin:0 auto; padding-bottom:40px; }
.card {
  background:var(--panel); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px; margin-bottom:12px;
}
.card h2 { font-size:14px; color:var(--text2); text-transform:uppercase;
           letter-spacing:1px; margin-bottom:10px; font-weight:600; }
.row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.row:last-child { margin-bottom:0; }
label { display:block; font-size:11px; color:var(--text2);
        text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
input, select, textarea {
  width:100%; background:var(--panel2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); padding:10px 12px; font-size:16px;
  font-family:inherit;
}
input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); }
input[type=number] { -moz-appearance:textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
textarea { resize:vertical; min-height:54px; }

button {
  background:var(--accent); border:none; border-radius:8px;
  color:white; padding:11px 16px; font-size:15px; font-weight:600;
  cursor:pointer; font-family:inherit;
}
button.secondary { background:var(--panel2); color:var(--text); border:1px solid var(--border); }
button.green { background:var(--green); }
button.danger { background:transparent; color:var(--red); border:1px solid var(--red); }
button:active { transform:scale(0.97); }
button.full { width:100%; }

.machine-card {
  background:var(--panel2); border:1px solid var(--border); border-radius:10px;
  padding:14px; margin-bottom:10px; cursor:pointer; transition:border-color .15s;
}
.machine-card:active { border-color:var(--accent); }
.machine-card .mc-title { font-size:16px; font-weight:700; margin-bottom:4px; }
.machine-card .mc-meta { font-size:13px; color:var(--text2); }

.name-btn {
  width:100%; text-align:left; background:var(--panel2); border:1px solid var(--border);
  border-radius:10px; color:var(--text); padding:16px; margin-bottom:10px;
  font-size:18px; font-weight:600; display:flex; align-items:center; gap:12px;
}
.name-btn:active { border-color:var(--accent); }
.name-btn .nb-ava { width:38px; height:38px; border-radius:50%;
  background:var(--accent); color:#fff; display:flex; align-items:center;
  justify-content:center; font-size:16px; font-weight:700; flex:0 0 auto; }

.day-row {
  background:var(--panel2); border:1px solid var(--border); border-radius:10px;
  padding:10px 12px; margin-bottom:8px; display:flex; align-items:center;
  gap:10px; cursor:pointer;
}
.day-row:active { border-color:var(--accent); }
.day-row .dr-num { font-size:15px; font-weight:700; color:var(--accent2);
                    min-width:54px; text-align:center; }
.day-row .dr-info { flex:1; min-width:0; }
.day-row .dr-info .dr-line1 { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.day-row .dr-info .dr-line2 { font-size:12px; color:var(--text2); margin-top:2px; }
.day-row .dr-hours { font-size:16px; font-weight:700; color:var(--green); white-space:nowrap; }

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }

.totals { background:var(--panel2); border-radius:8px; padding:10px 12px;
  font-size:13px; color:var(--text2); }
.totals b { color:var(--text); font-size:15px; }

.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--panel); border:1px solid var(--accent); border-radius:24px;
  padding:10px 18px; font-size:14px; z-index:2000;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
  opacity:0; transition:opacity .2s; pointer-events:none; max-width:90%; text-align:center;
}
.toast.show { opacity:1; }

.empty-msg { text-align:center; color:var(--text2); padding:30px 14px; font-size:14px; }
.help { font-size:12px; color:var(--text2); margin-top:6px; }

.section-header { display:flex; align-items:center; gap:8px; margin:18px 0 8px; }
.section-header .sh-title { font-size:12px; color:var(--text2);
                             text-transform:uppercase; letter-spacing:1px; font-weight:600; }
.section-header .sh-line { flex:1; height:1px; background:var(--border); }

.tabs { display:flex; gap:4px; background:var(--panel2); border-radius:10px;
        padding:4px; margin-bottom:14px; }
.tab { flex:1; text-align:center; padding:8px 0; font-size:13px;
       color:var(--text2); cursor:pointer; border-radius:7px; font-weight:600; }
.tab.active { background:var(--accent); color:white; }

.chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.chip { background:var(--panel2); border:1px solid var(--border); color:var(--text2);
        border-radius:16px; padding:6px 12px; font-size:13px; cursor:pointer; font-weight:600; }
.chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }

.toggle-yn { display:flex; gap:8px; }
.toggle-yn button { flex:1; }
.toggle-yn button.off { background:var(--panel2); color:var(--text2); border:1px solid var(--border); }

.month-banner {
  background:linear-gradient(135deg, var(--accent) 0%, #c93753 100%);
  border-radius:var(--radius); padding:18px 20px; margin-bottom:14px;
  text-align:center; box-shadow:0 4px 12px rgba(233,69,96,0.3);
}
.month-banner .mb-label { font-size:11px; color:rgba(255,255,255,0.75);
                           text-transform:uppercase; letter-spacing:2px; margin-bottom:4px; }
.month-banner .mb-value { font-size:30px; font-weight:800; color:white; line-height:1.1; }
.month-banner .mb-year  { font-size:22px; opacity:0.85; font-weight:600; }
.month-banner .mb-sub   { font-size:14px; color:rgba(255,255,255,0.85); margin-top:6px; font-weight:600; }

.dekada-title {
  background:linear-gradient(135deg, var(--accent) 0%, #c93753 100%);
  color:white; padding:10px 14px; border-radius:8px;
  font-size:18px; font-weight:700; text-align:center; margin-bottom:12px;
}

.moto-hint { font-size:13px; color:var(--text2); margin-top:6px; }
.moto-hint b { color:var(--green); font-size:15px; }
.moto-hint.warn b { color:var(--accent2); }

.big-cta { width:100%; padding:20px; font-size:19px; font-weight:800;
  background:linear-gradient(135deg,var(--green) 0%,#2f9e63 100%);
  border-radius:var(--radius); margin-bottom:14px; }

table.report { width:100%; border-collapse:collapse; font-size:13px; }
table.report th, table.report td { border:1px solid var(--border); padding:6px 8px; text-align:left; }
table.report th { background:var(--panel2); color:var(--text2); font-size:11px;
  text-transform:uppercase; letter-spacing:0.5px; }
table.report td.num { text-align:right; font-variant-numeric:tabular-nums; }
.report-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }

.stavba-sum { display:flex; justify-content:space-between; padding:8px 10px;
  border-bottom:1px solid var(--border); font-size:14px; }
.stavba-sum b { color:var(--green); }

.menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.menu-item { background:var(--panel2); border:1px solid var(--border); border-radius:10px;
  padding:16px; text-align:center; cursor:pointer; font-weight:600; }
.menu-item:active { border-color:var(--accent); }
.menu-item .mi-ico { font-size:24px; display:block; margin-bottom:6px; }

.list-edit { display:flex; align-items:center; gap:8px; background:var(--panel2);
  border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
.list-edit .le-main { flex:1; min-width:0; }
.list-edit .le-title { font-weight:600; }
.list-edit .le-sub { font-size:12px; color:var(--text2); }
.list-edit button { padding:6px 10px; font-size:13px; }

.inactive { opacity:0.45; }

@media print {
  body { background:#fff; color:#000; }
  header, .no-print, .month-banner, .chips, .tabs, button { display:none !important; }
  main { max-width:none; padding:0; }
  .card { border:none; background:#fff; padding:0; }
  table.report th, table.report td { border:1px solid #000; }
  table.report th { background:#eee; color:#000; }
  .stavba-sum { color:#000; }
  .stavba-sum b { color:#000; }
}
</style>

<body>

<header>
  <button class="btn-back" id="btn-back" style="display:none;" onclick="goBack()">←</button>
  <h1 id="page-title">Desetidenka</h1>
  <button id="btn-logout" onclick="logout()" title="Odhlásit" style="display:none;">⏻</button>
</header>

<main id="main"><div class="empty-msg">Načítám…</div></main>
<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════════════════
   1) FIREBASE KONFIGURACE  (projekt vykazy-stroju)
   ════════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyCWwTH8HOezVQf7QRNmVq3pL0fRgIyqbAM",
  authDomain:        "vykazy-stroju.firebaseapp.com",
  projectId:         "vykazy-stroju",
  storageBucket:     "vykazy-stroju.firebasestorage.app",
  messagingSenderId: "1092189517109",
  appId:             "1:1092189517109:web:23da2d8f54362c9cfc487c"
};
const FIREBASE_CONFIGURED = !JSON.stringify(firebaseConfig).includes("PASTE_");

/* ── Pomocné funkce ─────────────────────────────────────── */
function pad2(n){ return String(n).padStart(2,'0'); }
function iso(y,m,d){ return y+'-'+pad2(m)+'-'+pad2(d); }
function todayISO(){ const d=new Date(); return iso(d.getFullYear(), d.getMonth()+1, d.getDate()); }
function isoParts(s){ const [y,m,d]=s.split('-').map(Number); return {y,m,d}; }
function isoToCz(s){ const p=isoParts(s); return p.d+'.'+p.m+'.'+p.y; }
function currentDecade(dateISO){
  const p = dateISO ? isoParts(dateISO) : (function(){const d=new Date();return{y:d.getFullYear(),m:d.getMonth()+1,d:d.getDate()};})();
  const dek = p.d <= 10 ? 1 : (p.d <= 20 ? 2 : 3);
  return { rok:p.y, mesic:p.m, dekada:dek };
}
function decadeRange(year, month, dek){
  if(dek === 1) return { from:1, to:10 };
  if(dek === 2) return { from:11, to:20 };
  const last = new Date(year, month, 0).getDate();
  return { from:21, to:last };
}
function mesicNazev(m){
  return ['leden','únor','březen','duben','květen','červen','červenec','srpen','září','říjen','listopad','prosinec'][m-1];
}
function hoursDiff(od, doStr){
  if(!od || !doStr) return 0;
  const [h1,m1] = od.split(':').map(Number);
  const [h2,m2] = doStr.split(':').map(Number);
  if(isNaN(h1)||isNaN(m1)||isNaN(h2)||isNaN(m2)) return 0;
  let mins = (h2*60+m2) - (h1*60+m1);
  if(mins < 0) mins += 24*60;
  return Math.round(mins / 6) / 10;
}
function round1(n){ return Math.round((Number(n)||0)*10)/10; }
function uid(prefix){ return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
function slug(s){ return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'x'; }
function escapeHtml(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function toast(msg, ms){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(()=> t.classList.remove('show'), ms||1800);
}

/* ── Stav aplikace (cache z Firestore) ─────────────────── */
const state = {
  uid: null, me: null,
  strojnici: [], stroje: [], stavby: [], zaznamy: [],
  loaded: { strojnici:false, stroje:false, stavby:false, zaznamy:false },
  started: false
};
let db = null, auth = null;

/* identifikace stroje pro řetězec počítadla (per STROJ, ne per strojník) */
function zStrojKey(z){ return z.strojId ? ('id:'+z.strojId) : ('man:'+slug(z.strojNazev)); }
// Klíč zahrnuje i strojníka → každý strojník má max. 1 záznam na stroj/den.
// Jiný strojník udělá vlastní (samostatný) záznam, nelze přepsat cizí.
function recordId(strojnikId, strojKey, datum){ return slug(strojnikId) + '__' + slug(strojKey) + '__' + datum; }

// Našeptávač staveb – učí se ze zadaných hodnot + číselníku
function stavbaSuggestions(){
  const set = new Set();
  state.stavby.filter(s=>s.aktivni!==false).forEach(s=> set.add(s.kod||s.nazev));
  state.zaznamy.forEach(z=>{ if(z.stavbaText) set.add(z.stavbaText); });
  return [...set].filter(Boolean).sort((a,b)=>a.localeCompare(b,'cs'));
}
// Našeptávač ručně psaných strojů
function strojManualSuggestions(){
  const set = new Set();
  state.zaznamy.forEach(z=>{ if(z.strojRucni && z.strojNazev) set.add(z.strojNazev); });
  return [...set].filter(Boolean).sort((a,b)=>a.localeCompare(b,'cs'));
}
// Jsem autor záznamu / admin?
function canEditRecord(z){ return !z || z.ownerUid===state.uid || (state.me && state.me.role==='admin'); }

/* poslední stav počítadla daného stroje PŘED daným dnem (napříč strojníky) */
function prevMoto(strojKey, datum){
  const recs = state.zaznamy
    .filter(z => zStrojKey(z)===strojKey && z.datum < datum && z.stavCitadla!=null)
    .sort((a,b)=> a.datum < b.datum ? 1 : -1);
  return recs.length ? recs[0] : null;
}

/* ════════════════════════════════════════════════════════════════════
   2) ROUTER
   ════════════════════════════════════════════════════════════════════ */
const routeStack = [];
function navigate(view, params){ routeStack.push({ view, params:params||{} }); render(); }
function goBack(){ if(routeStack.length <= 1){ render(); return; } routeStack.pop(); render(); }
function setRoot(view, params){ routeStack.length = 0; routeStack.push({ view, params:params||{} }); render(); }

function render(){
  if(!routeStack.length){ document.getElementById('main').innerHTML='<div class="empty-msg">Načítám…</div>'; return; }
  const r = routeStack[routeStack.length-1];
  document.getElementById('btn-back').style.display = (routeStack.length > 1) ? 'inline-block' : 'none';
  const map = { setup:renderSetup, login:renderLogin, home:renderHome, den:renderDen,
                prehled:renderPrehled, ciselniky:renderCiselniky };
  (map[r.view] || renderHome)(r.params);
  window.scrollTo(0,0);
}
function rerender(){ if(routeStack.length) render(); }

/* ════════════════════════════════════════════════════════════════════
   3) SETUP (Firebase není nakonfigurován)
   ════════════════════════════════════════════════════════════════════ */
function renderSetup(){
  document.getElementById('page-title').innerHTML = 'Nastavení';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('main').innerHTML = `
    <div class="card">
      <h2>Aplikace ještě není propojená s cloudem</h2>
      <p style="margin-bottom:10px;">Vlož do <code>index.html</code> nahoře údaje z Firebase projektu (objekt <code>firebaseConfig</code>). Postup je v <code>README.md</code>.</p>
    </div>`;
}

/* ════════════════════════════════════════════════════════════════════
   4) LOGIN – výběr jména ze seznamu (+ volitelný PIN)
   ════════════════════════════════════════════════════════════════════ */
function renderLogin(){
  document.getElementById('page-title').innerHTML = 'Přihlášení';
  document.getElementById('btn-logout').style.display = 'none';
  const lidi = state.strojnici.filter(s => s.aktivni !== false);

  let inner;
  if(!state.loaded.strojnici){
    inner = '<div class="empty-msg">Načítám seznam…</div>';
  } else if(lidi.length === 0){
    inner = `
      <div class="card">
        <h2>Zatím tu není žádný strojník</h2>
        <p style="margin-bottom:10px;">Přidej první jméno – to bude zároveň <b>správce</b> (vedoucí), který pak spravuje seznam strojníků, strojů a staveb.</p>
        <label>Jméno a příjmení</label>
        <input id="first-name" placeholder="např. Jan Novák" autocomplete="name">
        <button class="full green" style="margin-top:10px;" onclick="createFirstPerson()">Vytvořit a přihlásit jako správce</button>
      </div>`;
  } else {
    inner = `
      <div class="card">
        <h2>Kdo jsi?</h2>
        ${lidi.map(s => `
          <button class="name-btn" onclick="pickName('${s.id}')">
            <span class="nb-ava">${escapeHtml((s.jmeno||'?').trim().charAt(0).toUpperCase())}</span>
            <span>${escapeHtml(s.jmeno)}${s.role==='admin'?' <span style="font-size:12px;color:var(--accent2);">★ vedoucí</span>':''}</span>
          </button>`).join('')}
      </div>
      <p class="help">Své jméno tu nevidíš? Přidá ho vedoucí v sekci Číselníky → Strojníci.</p>`;
  }
  document.getElementById('main').innerHTML = inner;
}

async function createFirstPerson(){
  const jmeno = (document.getElementById('first-name').value||'').trim();
  if(jmeno.length < 2){ toast('Zadej jméno'); return; }
  try{
    const id = uid('strojnik');
    await db.collection('strojnici').doc(id).set({
      jmeno, role:'admin', aktivni:true, claimedUid: state.uid, pinHash:null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection('uids').doc(state.uid).set({ strojnikId:id }).catch(()=>{});
    toast('✓ Vytvořeno');
  }catch(e){ alert('Nepodařilo se uložit: '+e.message); }
}

async function pickName(id){
  const s = state.strojnici.find(x=>x.id===id);
  if(!s) return;
  if(s.claimedUid && s.claimedUid !== state.uid){
    if(!confirm(s.jmeno+' je přihlášený/á na jiném zařízení. Převzít přihlášení sem?')) return;
  }
  if(s.pinHash){
    const pin = prompt('PIN pro '+s.jmeno+':');
    if(pin==null) return;
    if(await sha256(pin.trim()) !== s.pinHash){ toast('Špatný PIN'); return; }
  }
  try{
    await db.collection('strojnici').doc(id).update({ claimedUid: state.uid });
    await db.collection('uids').doc(state.uid).set({ strojnikId:id }).catch(()=>{});
    toast('✓ Přihlášen');
  }catch(e){ alert('Chyba přihlášení: '+e.message); }
}

async function logout(){
  if(!state.me) return;
  if(!confirm('Odhlásit '+state.me.jmeno+' z tohoto telefonu?')) return;
  try{
    await db.collection('strojnici').doc(state.me.id).update({ claimedUid: null });
    await db.collection('uids').doc(state.uid).delete().catch(()=>{});
  }
  catch(e){ alert(e.message); }
}

/* ════════════════════════════════════════════════════════════════════
   5) HOME – strojník
   ════════════════════════════════════════════════════════════════════ */
function myZaznamy(){
  if(!state.me) return [];
  return state.zaznamy.filter(z => z.strojnikId === state.me.id)
    .sort((a,b)=> a.datum < b.datum ? 1 : -1);
}
function renderHome(){
  if(!state.me){ setRoot('login'); return; }
  document.getElementById('page-title').innerHTML = 'Moje <span class="accent">výkazy</span>';
  document.getElementById('btn-logout').style.display = 'inline-block';

  const cur = currentDecade();
  const range = decadeRange(cur.rok, cur.mesic, cur.dekada);
  const from = iso(cur.rok,cur.mesic,range.from), to = iso(cur.rok,cur.mesic,range.to);
  const mine = myZaznamy();
  const inDek = mine.filter(z => z.datum>=from && z.datum<=to);
  const sumMth = round1(inDek.reduce((s,z)=> s+(Number(z.mth)||0),0));

  let listHtml;
  if(mine.length===0){
    listHtml = '<div class="empty-msg">Zatím žádný den. Klikni nahoře na „Zapsat dnešek".</div>';
  } else {
    listHtml = mine.slice(0,40).map(z => {
      const tank = z.tankoval ? ' · ⛽' : '';
      return `
      <div class="day-row" onclick="navigate('den',{id:'${z.id}'})">
        <div class="dr-num">${isoToCz(z.datum).replace(/\.\d{4}$/,'.')}</div>
        <div class="dr-info">
          <div class="dr-line1">${escapeHtml(z.strojNazev||'(stroj?)')}</div>
          <div class="dr-line2">${escapeHtml(z.stavbaText||'(stavba?)')}${tank}</div>
        </div>
        <div class="dr-hours">${z.mth!=null?round1(z.mth).toFixed(1)+' mth':'–'}</div>
      </div>`;
    }).join('');
  }

  const adminBtn = (state.me.role==='admin')
    ? `<div class="menu-item" onclick="navigate('ciselniky',{})"><span class="mi-ico">⚙️</span>Číselníky</div>` : '';

  document.getElementById('main').innerHTML = `
    <div class="month-banner">
      <div class="mb-label">Dnes</div>
      <div class="mb-value">${isoToCz(todayISO())}</div>
      <div class="mb-sub">${cur.dekada}. dekáda · ${escapeHtml(state.me.jmeno)}</div>
    </div>

    <button class="big-cta" onclick="navigate('den',{datum:'${todayISO()}'})">➕ Zapsat dnešek</button>

    <div class="totals" style="margin-bottom:14px;">
      Tato dekáda: <b>${inDek.length}</b> dní · motohodiny <b>${sumMth.toFixed(1)} mth</b>
    </div>

    <div class="menu-grid" style="margin-bottom:6px;">
      <div class="menu-item" onclick="navigate('prehled',{})"><span class="mi-ico">📊</span>Přehled / desetidenka</div>
      ${adminBtn || `<div class="menu-item" onclick="navigate('den',{datum:'${todayISO()}'})"><span class="mi-ico">📝</span>Nový den</div>`}
    </div>

    <div class="section-header"><span class="sh-title">Moje poslední dny</span><span class="sh-line"></span></div>
    ${listHtml}
  `;
}

/* ════════════════════════════════════════════════════════════════════
   6) DEN – rychlý zápis (cíl < 15 s)
   ════════════════════════════════════════════════════════════════════ */
function renderDen(params){
  if(!state.me){ setRoot('login'); return; }
  const existing = params.id ? (state.zaznamy.find(z=>z.id===params.id) || null) : null;
  const datum = existing ? existing.datum : (params.datum || todayISO());
  const r = existing || {};
  const manual = existing ? !!existing.strojRucni : false;
  const readOnly = existing ? !canEditRecord(existing) : false;

  document.getElementById('page-title').innerHTML = existing ? (readOnly?'Záznam':'Upravit den') : 'Nový den';
  document.getElementById('btn-logout').style.display = 'none';

  // Read-only pohled (cizí záznam) – nelze měnit data, ALE lze přidat připomínku.
  if(readOnly){
    document.getElementById('main').innerHTML = `
      <div class="dekada-title">${isoToCz(datum)}</div>
      <div class="card">
        <div class="le-sub" style="margin-bottom:10px;">✍ Zapsal: <b style="color:var(--text);">${escapeHtml(r.strojnikJmeno||'?')}</b></div>
        <div class="stavba-sum"><span>Stroj</span><b>${escapeHtml(r.strojNazev||'')}</b></div>
        <div class="stavba-sum"><span>Stavba</span><b>${escapeHtml(r.stavbaText||'')}</b></div>
        <div class="stavba-sum"><span>Počítadlo</span><b>${r.stavCitadla!=null?r.stavCitadla:'–'}</b></div>
        <div class="stavba-sum"><span>Motohodiny</span><b>${r.mth!=null?round1(r.mth).toFixed(1)+' mth':'–'}</b></div>
        ${(r.hodOd||r.hodDo)?`<div class="stavba-sum"><span>Hodiny</span><b>${r.hodOd||''}–${r.hodDo||''}</b></div>`:''}
        <div class="stavba-sum"><span>Tankování</span><b>${r.tankoval?'⛽ ano':'ne'}</b></div>
        ${r.poznamka?`<div class="stavba-sum"><span>Poznámka</span><b>${escapeHtml(r.poznamka)}</b></div>`:''}
      </div>
      <p class="help">Data tohoto záznamu může změnit jen jeho autor (${escapeHtml(r.strojnikJmeno||'?')}) nebo administrátor. Připomínku ale můžeš přidat i ty.</p>
      ${poznamkyCardHtml(existing)}`;
    if(existing) loadPoznamky(existing.id);
    return;
  }

  const strojeAkt = state.stroje.filter(s=>s.aktivni!==false);
  const strojOptions = strojeAkt.map(s =>
    `<option value="${s.id}" ${existing && existing.strojId===s.id?'selected':''}>${escapeHtml(s.nazev)}${s.spz?' ('+escapeHtml(s.spz)+')':''}</option>`).join('');
  const stavbyOptions = stavbaSuggestions().map(v => `<option value="${escapeHtml(v)}">`).join('');
  const strojManualOptions = strojManualSuggestions().map(v => `<option value="${escapeHtml(v)}">`).join('');
  const autor = existing ? existing.strojnikJmeno : state.me.jmeno;

  document.getElementById('main').innerHTML = `
    <div class="dekada-title">${isoToCz(datum)}</div>

    <button class="full secondary" style="margin-bottom:12px;" onclick="copyYesterday()">📋 Jako včera (předvyplnit)</button>

    <div class="card">
      <div class="le-sub" style="margin-bottom:10px;">✍ Zapisuje: <b style="color:var(--text);">${escapeHtml(autor)}</b>${existing&&existing.ownerUid!==state.uid?' (upravuje admin)':''}</div>
      <div class="row" style="display:block;">
        <label>Datum</label>
        <input id="f-datum" type="date" value="${datum}" onchange="updateMth();checkConflict();">
      </div>

      <div class="row" style="display:block;">
        <label>Stroj</label>
        <select id="f-stroj" onchange="onStrojChange()">
          <option value="">— vyber stroj —</option>
          ${strojOptions}
          <option value="__manual__" ${manual?'selected':''}>✏️ napsat ručně…</option>
        </select>
        <input id="f-strojManual" list="stroj-manual-list" placeholder="napiš název stroje" style="margin-top:8px; display:${manual?'block':'none'};" value="${manual?escapeHtml(existing.strojNazev||''):''}" oninput="updateMth();checkConflict();">
        <datalist id="stroj-manual-list">${strojManualOptions}</datalist>
      </div>

      <div id="day-conflict" class="moto-hint warn" style="margin:0 0 6px;"></div>

      <div class="row" style="display:block;">
        <label>Stavba</label>
        <input id="f-stavba" list="stavby-list" placeholder="začni psát… (např. Marti → Martinovice)" value="${escapeHtml(r.stavbaText||'')}">
        <datalist id="stavby-list">${stavbyOptions}</datalist>
      </div>

      <div class="row" style="display:block;">
        <label>Stav počítadla motohodin</label>
        <input id="f-stav" type="number" step="0.1" inputmode="decimal" placeholder="např. 7591" value="${r.stavCitadla!=null?r.stavCitadla:''}" oninput="updateMth()">
        <div class="moto-hint" id="moto-hint"></div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <h2 style="margin:0;">Tankování</h2>
        <div class="toggle-yn" style="width:160px;">
          <button id="tank-no"  class="${r.tankoval?'off':''}" onclick="setTank(false)">Ne</button>
          <button id="tank-yes" class="${r.tankoval?'':'off'}" onclick="setTank(true)">⛽ Ano</button>
        </div>
      </div>
      <details ${ (r.hodOd||r.hodDo) ? 'open':''}>
        <summary style="cursor:pointer;color:var(--text2);font-size:13px;">+ Odpracované hodiny (od–do) – nepovinné</summary>
        <div class="grid-3" style="margin-top:10px;">
          <div><label>od</label><input id="f-od" type="time" value="${r.hodOd||''}" onchange="updateHod()"></div>
          <div><label>do</label><input id="f-do" type="time" value="${r.hodDo||''}" onchange="updateHod()"></div>
          <div><label>celkem</label><input id="f-hod" readonly value="${hoursDiff(r.hodOd,r.hodDo).toFixed(1)}" style="opacity:.7;"></div>
        </div>
      </details>
      <div class="row" style="display:block;margin-top:10px;">
        <label>Poznámka k mému zápisu (nepovinné)</label>
        <input id="f-pozn" placeholder="" value="${escapeHtml(r.poznamka||'')}">
      </div>
    </div>

    <div style="display:flex;gap:8px;">
      <button class="green" style="flex:1;" onclick="saveDen()">Uložit den</button>
      ${existing && canEditRecord(existing) ? `<button class="danger" onclick="deleteDen('${existing.id}')">Smazat</button>` : ''}
    </div>
    <input type="hidden" id="f-existingId" value="${existing?existing.id:''}">

    ${poznamkyCardHtml(existing)}
  `;
  _tank = !!r.tankoval;
  updateMth();
  checkConflict();
  if(existing) loadPoznamky(existing.id);
}

function checkConflict(){
  const div = document.getElementById('day-conflict');
  if(!div) return;
  const datum = document.getElementById('f-datum').value;
  const strojKey = currentStrojKey();
  const existingId = document.getElementById('f-existingId').value;
  if(!strojKey){ div.innerHTML=''; div.style.display='none'; return; }
  const others = state.zaznamy.filter(z =>
    z.datum===datum && zStrojKey(z)===strojKey && z.id!==existingId && z.strojnikId!==state.me.id);
  if(others.length){
    div.style.display='block';
    div.innerHTML = '⚠ Tento stroj už pro '+isoToCz(datum)+' zapsal '+escapeHtml(others.map(o=>o.strojnikJmeno).filter(Boolean).join(', '))
      +'. Tvůj zápis bude <b>samostatný</b> a jeho nepřepíše – do připomínky napiš důvod (např. „předchozí je chybně").';
  } else { div.innerHTML=''; div.style.display='none'; }
}

let _tank = false;
function setTank(v){
  _tank = v;
  document.getElementById('tank-yes').className = v?'':'off';
  document.getElementById('tank-no').className  = v?'off':'';
}
function onStrojChange(){
  const v = document.getElementById('f-stroj').value;
  document.getElementById('f-strojManual').style.display = (v==='__manual__')?'block':'none';
  updateMth();
  checkConflict();
}
function updateHod(){
  document.getElementById('f-hod').value = hoursDiff(
    document.getElementById('f-od').value, document.getElementById('f-do').value).toFixed(1);
}
function currentStrojKey(){
  const sel = document.getElementById('f-stroj').value;
  if(sel==='__manual__'){ return 'man:'+slug(document.getElementById('f-strojManual').value); }
  if(sel){ return 'id:'+sel; }
  return null;
}
function updateMth(){
  const hint = document.getElementById('moto-hint');
  if(!hint) return;
  const datum = document.getElementById('f-datum').value;
  const strojKey = currentStrojKey();
  const stav = parseFloat(document.getElementById('f-stav').value);
  if(!strojKey || isNaN(stav)){ hint.className='moto-hint'; hint.innerHTML='Po zadání stroje a stavu počítadla se dopočítají motohodiny.'; return; }
  const prev = prevMoto(strojKey, datum);
  if(!prev){ hint.className='moto-hint'; hint.innerHTML='První zápis tohoto stroje – motohodiny za den = 0. Příště se počítají z rozdílu.'; return; }
  const mth = round1(stav - prev.stavCitadla);
  if(mth < 0){ hint.className='moto-hint warn'; hint.innerHTML=`⚠ Počítadlo (${stav}) je nižší než minule (${prev.stavCitadla} z ${isoToCz(prev.datum)}). Zkontroluj.`; }
  else { hint.className='moto-hint'; hint.innerHTML=`Minule ${prev.stavCitadla} (${isoToCz(prev.datum)}) → dnes <b>${mth.toFixed(1)} mth</b>`; }
}

function copyYesterday(){
  const mine = myZaznamy();
  if(!mine.length){ toast('Není z čeho kopírovat'); return; }
  const last = mine[0];
  const sel = document.getElementById('f-stroj');
  if(last.strojId && state.stroje.some(s=>s.id===last.strojId)){
    sel.value = last.strojId; onStrojChange();
  } else if(last.strojNazev){
    sel.value = '__manual__'; onStrojChange();
    document.getElementById('f-strojManual').value = last.strojNazev;
  }
  document.getElementById('f-stavba').value = last.stavbaText || '';
  if(last.hodOd||last.hodDo){
    const det = document.querySelector('details'); if(det) det.open = true;
    document.getElementById('f-od').value = last.hodOd||'';
    document.getElementById('f-do').value = last.hodDo||'';
    updateHod();
  }
  setTank(!!last.tankoval);
  document.getElementById('f-stav').focus();
  updateMth();
  toast('✓ Předvyplněno z '+isoToCz(last.datum)+' – uprav počítadlo');
}

async function saveDen(){
  const datum = document.getElementById('f-datum').value;
  if(!datum){ toast('Vyber datum'); return; }
  const sel = document.getElementById('f-stroj').value;
  let strojId=null, strojNazev='', strojRucni=false;
  if(sel==='__manual__'){
    strojNazev = (document.getElementById('f-strojManual').value||'').trim();
    strojRucni = true;
    if(!strojNazev){ toast('Napiš název stroje'); return; }
  } else if(sel){
    const s = state.stroje.find(x=>x.id===sel);
    if(!s){ toast('Vyber stroj'); return; }
    strojId = s.id; strojNazev = s.nazev;
  } else { toast('Vyber stroj'); return; }

  const stavbaText = (document.getElementById('f-stavba').value||'').trim();
  const stavbaMatch = state.stavby.find(s => (s.kod||s.nazev)===stavbaText);
  const stavStr = document.getElementById('f-stav').value;
  const stavCitadla = stavStr==='' ? null : Number(stavStr);
  const hodOd = document.getElementById('f-od') ? document.getElementById('f-od').value : '';
  const hodDo = document.getElementById('f-do') ? document.getElementById('f-do').value : '';
  const poznamka = (document.getElementById('f-pozn').value||'').trim();

  if(stavCitadla==null && !stavbaText && !hodOd){ toast('Vyplň aspoň stavbu nebo počítadlo'); return; }

  const strojKey = strojId ? ('id:'+strojId) : ('man:'+slug(strojNazev));
  let mth = 0;
  if(stavCitadla!=null){
    const prev = prevMoto(strojKey, datum);
    if(prev){
      mth = round1(stavCitadla - prev.stavCitadla);
      if(mth < 0 && !confirm('Počítadlo je nižší než minule – motohodiny vyjdou záporně. Uložit i tak?')) return;
    }
  }

  // Editace existujícího → zachovej jeho ID a původního autora (i když ho mění admin).
  const existingId = document.getElementById('f-existingId').value;
  const existing = existingId ? state.zaznamy.find(z=>z.id===existingId) : null;
  if(existing && !canEditRecord(existing)){ toast('Tento záznam nesmíš měnit'); return; }
  const id = existing ? existing.id : recordId(state.me.id, strojKey, datum);
  const already = existing || state.zaznamy.find(z=>z.id===id);
  const ownerUid     = existing ? existing.ownerUid     : state.uid;
  const authorId     = existing ? existing.strojnikId   : state.me.id;
  const authorJmeno  = existing ? existing.strojnikJmeno : state.me.jmeno;

  const docData = {
    datum, strojId, strojNazev, strojRucni,
    strojnikId: authorId, strojnikJmeno: authorJmeno,
    ownerUid,
    stavbaId: stavbaMatch ? stavbaMatch.id : null,
    stavbaText,
    stavCitadla, mth,
    hodOd, hodDo, tankoval: !!_tank,
    poznamka,
    upravilJmeno: state.me.jmeno,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  if(!already) docData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
  try{
    await db.collection('zaznamy').doc(id).set(docData, { merge:true });
    if(strojId && stavCitadla!=null){
      const s = state.stroje.find(x=>x.id===strojId);
      if(s && (!s.lastMotoDate || datum >= s.lastMotoDate)){
        db.collection('stroje').doc(strojId).set(
          { lastMoto: stavCitadla, lastMotoDate: datum }, { merge:true }).catch(()=>{});
      }
    }
    toast('✓ Uloženo');
    goBack();
  }catch(e){ alert('Uložení selhalo: '+e.message); }
}

async function deleteDen(id){
  if(!confirm('Smazat tento den?')) return;
  try{ await db.collection('zaznamy').doc(id).delete(); toast('🗑 Smazáno'); goBack(); }
  catch(e){ alert(e.message); }
}

/* ── Připomínky k záznamu (vlákno) ─────────────────────────
   Přidat smí kdokoli k jakémukoli záznamu; data záznamu se nemění.
   Cizí připomínku nepřepíše/nesmaže nikdo kromě jejího autora nebo admina. */
let _poznUnsub = null;
function poznamkyCardHtml(existing){
  if(!existing) return '<p class="help" style="margin-top:12px;">💬 Připomínky půjde přidat po uložení záznamu.</p>';
  return `
    <div class="card">
      <h2>💬 Připomínky k záznamu</h2>
      <div id="pozn-list"><div class="help">Načítám…</div></div>
      <div class="row" style="display:block;margin-top:10px;">
        <textarea id="pozn-new" placeholder="napiš připomínku (uvidí ji všichni, podepíše se tvým jménem) – např. předchozí záznam je chybně"></textarea>
        <button class="full secondary" style="margin-top:8px;" onclick="addPoznamka('${existing.id}')">+ Přidat připomínku</button>
      </div>
    </div>`;
}
function loadPoznamky(recordId){
  if(_poznUnsub){ try{ _poznUnsub(); }catch(e){} _poznUnsub = null; }
  if(!document.getElementById('pozn-list')) return;
  _poznUnsub = db.collection('zaznamy').doc(recordId).collection('poznamky')
    .orderBy('createdAt','asc')
    .onSnapshot(snap=>{
      const el = document.getElementById('pozn-list');
      if(!el) return;
      if(snap.empty){ el.innerHTML = '<div class="help">Zatím žádná připomínka.</div>'; return; }
      el.innerHTML = snap.docs.map(d=>{
        const p = d.data();
        const mine = p.autorUid===state.uid || (state.me && state.me.role==='admin');
        return `<div class="list-edit">
          <div class="le-main">
            <div class="le-title" style="font-size:14px;font-weight:500;">${escapeHtml(p.text)}</div>
            <div class="le-sub">✍ ${escapeHtml(p.autorJmeno||'?')}</div>
          </div>
          ${mine?`<button class="secondary" onclick="deletePoznamka('${recordId}','${d.id}')">✕</button>`:''}
        </div>`;
      }).join('');
    }, err=>{ const el=document.getElementById('pozn-list'); if(el) el.innerHTML='<div class="help">Připomínky nelze načíst.</div>'; });
}
async function addPoznamka(recordId){
  const ta = document.getElementById('pozn-new');
  const t = (ta.value||'').trim();
  if(!t){ toast('Napiš text připomínky'); return; }
  try{
    await db.collection('zaznamy').doc(recordId).collection('poznamky').add({
      text:t, autorUid:state.uid, autorJmeno:state.me.jmeno,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    ta.value = '';
    toast('✓ Připomínka přidána');
  }catch(e){ alert('Nepodařilo se uložit: '+e.message); }
}
async function deletePoznamka(recordId, pid){
  if(!confirm('Smazat tuto připomínku?')) return;
  try{ await db.collection('zaznamy').doc(recordId).collection('poznamky').doc(pid).delete(); }
  catch(e){ alert(e.message); }
}

/* ════════════════════════════════════════════════════════════════════
   7) PŘEHLED / DESETIDENKA – filtry + součty po stavbách
   ════════════════════════════════════════════════════════════════════ */
const filt = { strojId:'', strojnikId:'', stavba:'', from:'', to:'' };
function setPeriod(kind){
  const cur = currentDecade();
  if(kind==='dek'){ const r=decadeRange(cur.rok,cur.mesic,cur.dekada); filt.from=iso(cur.rok,cur.mesic,r.from); filt.to=iso(cur.rok,cur.mesic,r.to); }
  else if(kind==='mes'){ const last=new Date(cur.rok,cur.mesic,0).getDate(); filt.from=iso(cur.rok,cur.mesic,1); filt.to=iso(cur.rok,cur.mesic,last); }
  else if(kind==='min'){ let m=cur.mesic-1,y=cur.rok; if(m<1){m=12;y--;} const last=new Date(y,m,0).getDate(); filt.from=iso(y,m,1); filt.to=iso(y,m,last); }
  else { filt.from=''; filt.to=''; }
  renderPrehled();
}
function applyFilter(){
  filt.strojId   = document.getElementById('flt-stroj').value;
  filt.strojnikId= document.getElementById('flt-strojnik').value;
  filt.stavba    = document.getElementById('flt-stavba').value;
  filt.from      = document.getElementById('flt-from').value;
  filt.to        = document.getElementById('flt-to').value;
  renderPrehled();
}
function filteredZaznamy(){
  return state.zaznamy.filter(z => {
    if(filt.strojId && z.strojId!==filt.strojId) return false;
    if(filt.strojnikId && z.strojnikId!==filt.strojnikId) return false;
    if(filt.stavba && (z.stavbaText||'')!==filt.stavba) return false;
    if(filt.from && z.datum < filt.from) return false;
    if(filt.to && z.datum > filt.to) return false;
    return true;
  }).sort((a,b)=> a.datum < b.datum ? -1 : (a.datum>b.datum?1:0));
}
function renderPrehled(){
  if(!state.me){ setRoot('login'); return; }
  document.getElementById('page-title').innerHTML = 'Přehled';
  document.getElementById('btn-logout').style.display = 'none';

  const onlyMine = state.me.role!=='admin';
  if(onlyMine && !filt.strojnikId) filt.strojnikId = state.me.id;

  const rows = filteredZaznamy().filter(z => onlyMine ? z.strojnikId===state.me.id : true);

  const bySt = {};
  let sumMth=0;
  rows.forEach(z => { const k=z.stavbaText||'(bez stavby)'; bySt[k]=(bySt[k]||0)+(Number(z.mth)||0); sumMth+=(Number(z.mth)||0); });
  const stavbySum = Object.keys(bySt).sort().map(k =>
    `<div class="stavba-sum"><span>${escapeHtml(k)}</span><b>${round1(bySt[k]).toFixed(1)} mth</b></div>`).join('');

  const strojOpts = '<option value="">Všechny stroje</option>'+state.stroje.map(s=>`<option value="${s.id}" ${filt.strojId===s.id?'selected':''}>${escapeHtml(s.nazev)}</option>`).join('');
  const strojnikOpts = '<option value="">Všichni strojníci</option>'+state.strojnici.map(s=>`<option value="${s.id}" ${filt.strojnikId===s.id?'selected':''}>${escapeHtml(s.jmeno)}</option>`).join('');
  const stavbaVals = [...new Set(state.zaznamy.map(z=>z.stavbaText).filter(Boolean))].sort();
  const stavbaOpts = '<option value="">Všechny stavby</option>'+stavbaVals.map(v=>`<option value="${escapeHtml(v)}" ${filt.stavba===v?'selected':''}>${escapeHtml(v)}</option>`).join('');

  const tableRows = rows.map(z=>`
    <tr onclick="navigate('den',{id:'${z.id}'})" style="cursor:pointer;">
      <td>${isoToCz(z.datum)}</td>
      <td>${escapeHtml(z.strojNazev||'')}</td>
      <td>${escapeHtml(z.strojnikJmeno||'')}</td>
      <td>${escapeHtml(z.stavbaText||'')}</td>
      <td class="num">${z.stavCitadla!=null?z.stavCitadla:''}</td>
      <td class="num">${z.mth!=null?round1(z.mth).toFixed(1):''}</td>
      <td>${z.hodOd&&z.hodDo?z.hodOd+'–'+z.hodDo:''}</td>
      <td style="text-align:center;">${z.tankoval?'⛽':''}</td>
    </tr>`).join('');

  document.getElementById('main').innerHTML = `
    <div class="card no-print">
      <h2>Filtry</h2>
      <div class="chips">
        <span class="chip" onclick="setPeriod('dek')">Tato dekáda</span>
        <span class="chip" onclick="setPeriod('mes')">Tento měsíc</span>
        <span class="chip" onclick="setPeriod('min')">Minulý měsíc</span>
        <span class="chip" onclick="setPeriod('all')">Vše</span>
      </div>
      <div class="grid-2">
        <div><label>Od</label><input id="flt-from" type="date" value="${filt.from}" onchange="applyFilter()"></div>
        <div><label>Do</label><input id="flt-to" type="date" value="${filt.to}" onchange="applyFilter()"></div>
      </div>
      <div class="row" style="display:block;margin-top:8px;"><label>Stroj</label><select id="flt-stroj" onchange="applyFilter()">${strojOpts}</select></div>
      ${onlyMine?'<input type="hidden" id="flt-strojnik" value="'+state.me.id+'">':`<div class="row" style="display:block;"><label>Strojník</label><select id="flt-strojnik" onchange="applyFilter()">${strojnikOpts}</select></div>`}
      <div class="row" style="display:block;"><label>Stavba</label><select id="flt-stavba" onchange="applyFilter()">${stavbaOpts}</select></div>
    </div>

    <div class="card">
      <h2>Součet motohodin po stavbách</h2>
      ${stavbySum || '<div class="empty-msg">Žádná data pro tento filtr.</div>'}
      ${rows.length?`<div class="stavba-sum" style="border:none;margin-top:6px;"><span><b>CELKEM</b></span><b>${round1(sumMth).toFixed(1)} mth</b> </div>`:''}
    </div>

    <div class="section-header"><span class="sh-title">Záznamy (${rows.length})</span><span class="sh-line"></span></div>
    <div class="report-wrap">
      <table class="report">
        <thead><tr>
          <th>Datum</th><th>Stroj</th><th>Strojník</th><th>Stavba</th>
          <th>Počítadlo</th><th>Mth</th><th>Hodiny</th><th>⛽</th>
        </tr></thead>
        <tbody>${tableRows||''}</tbody>
      </table>
    </div>

    <div class="row no-print" style="margin-top:14px;">
      <button class="secondary" style="flex:1;" onclick="exportCSV()">📥 Stáhnout CSV</button>
      <button class="secondary" style="flex:1;" onclick="window.print()">🖨 Tisk / PDF</button>
    </div>
  `;
}

function exportCSV(){
  const onlyMine = state.me.role!=='admin';
  const rows = filteredZaznamy().filter(z => onlyMine ? z.strojnikId===state.me.id : true);
  const head = ['Datum','Stroj','Strojnik','Stavba','Stav pocitadla','Mth','Od','Do','Tankovani','Poznamka'];
  const lines = [head.join(';')];
  rows.forEach(z=>{
    lines.push([
      z.datum, csv(z.strojNazev), csv(z.strojnikJmeno), csv(z.stavbaText),
      z.stavCitadla!=null?z.stavCitadla:'', z.mth!=null?round1(z.mth):'',
      z.hodOd||'', z.hodDo||'', z.tankoval?'ano':'', csv(z.poznamka)
    ].join(';'));
  });
  const bySt={}; rows.forEach(z=>{const k=z.stavbaText||'(bez stavby)';bySt[k]=(bySt[k]||0)+(Number(z.mth)||0);});
  lines.push(''); lines.push('Soucet po stavbach;mth');
  Object.keys(bySt).sort().forEach(k=> lines.push(csv(k)+';'+round1(bySt[k])));
  const blob = new Blob(['﻿'+lines.join('\r\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'desetidenka_'+(filt.from||'vse')+'_'+(filt.to||'')+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('✓ CSV staženo');
}
function csv(s){ s=String(s==null?'':s); return /[;"\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }

/* ════════════════════════════════════════════════════════════════════
   8) ČÍSELNÍKY (jen vedoucí/admin) – Stroje / Stavby / Strojníci
   ════════════════════════════════════════════════════════════════════ */
let ciselnikTab = 'stroje';
function renderCiselniky(){
  if(!state.me || state.me.role!=='admin'){ setRoot('home'); return; }
  document.getElementById('page-title').innerHTML = 'Číselníky';
  document.getElementById('btn-logout').style.display = 'none';

  const tabBtn = (k,l)=>`<div class="tab ${ciselnikTab===k?'active':''}" onclick="ciselnikTab='${k}';renderCiselniky()">${l}</div>`;
  let body='';
  if(ciselnikTab==='stroje') body = ciselnikStroje();
  else if(ciselnikTab==='stavby') body = ciselnikStavby();
  else body = ciselnikStrojnici();

  document.getElementById('main').innerHTML = `
    <div class="tabs">${tabBtn('stroje','Stroje')}${tabBtn('stavby','Stavby')}${tabBtn('strojnici','Strojníci')}</div>
    ${body}`;
}

function ciselnikStroje(){
  const list = state.stroje.slice().sort((a,b)=> (a.nazev||'').localeCompare(b.nazev||''));
  return `
    <div class="card">
      <h2>Přidat stroj</h2>
      <input id="ns-nazev" placeholder="Název (např. Finišer F-1800)">
      <div class="grid-2" style="margin-top:8px;">
        <input id="ns-typ" placeholder="Typ (válec…)">
        <input id="ns-spz" placeholder="SPZ / inv. č.">
      </div>
      <button class="full green" style="margin-top:10px;" onclick="addStroj()">+ Přidat stroj</button>
    </div>
    ${list.map(s=>`
      <div class="list-edit ${s.aktivni===false?'inactive':''}">
        <div class="le-main">
          <div class="le-title">${escapeHtml(s.nazev)}</div>
          <div class="le-sub">${escapeHtml(s.typ||'')}${s.spz?' · '+escapeHtml(s.spz):''}${s.lastMoto!=null?' · počítadlo '+s.lastMoto:''}</div>
        </div>
        <button class="secondary" onclick="toggleAktiv('stroje','${s.id}',${s.aktivni===false})">${s.aktivni===false?'Obnovit':'Skrýt'}</button>
      </div>`).join('') || '<div class="empty-msg">Zatím žádný stroj.</div>'}`;
}
async function addStroj(){
  const nazev=(document.getElementById('ns-nazev').value||'').trim();
  if(nazev.length<2){ toast('Zadej název'); return; }
  await db.collection('stroje').doc(uid('stroj')).set({
    nazev, typ:(document.getElementById('ns-typ').value||'').trim(),
    spz:(document.getElementById('ns-spz').value||'').trim(), aktivni:true,
    lastMoto:null, lastMotoDate:null
  });
  toast('✓ Stroj přidán');
}

function ciselnikStavby(){
  const list = state.stavby.slice().sort((a,b)=> (a.kod||a.nazev||'').localeCompare(b.kod||b.nazev||''));
  return `
    <div class="card">
      <h2>Přidat stavbu / akci</h2>
      <input id="nv-kod" placeholder="Krátký název (např. Horažďovice)">
      <input id="nv-nazev" placeholder="Plný název (nepovinné)" style="margin-top:8px;">
      <button class="full green" style="margin-top:10px;" onclick="addStavba()">+ Přidat stavbu</button>
    </div>
    ${list.map(s=>`
      <div class="list-edit ${s.aktivni===false?'inactive':''}">
        <div class="le-main">
          <div class="le-title">${escapeHtml(s.kod||s.nazev)}</div>
          ${s.nazev&&s.nazev!==s.kod?`<div class="le-sub">${escapeHtml(s.nazev)}</div>`:''}
        </div>
        <button class="secondary" onclick="toggleAktiv('stavby','${s.id}',${s.aktivni===false})">${s.aktivni===false?'Obnovit':'Skrýt'}</button>
      </div>`).join('') || '<div class="empty-msg">Zatím žádná stavba.</div>'}`;
}
async function addStavba(){
  const kod=(document.getElementById('nv-kod').value||'').trim();
  if(kod.length<2){ toast('Zadej název'); return; }
  await db.collection('stavby').doc(uid('stavba')).set({
    kod, nazev:(document.getElementById('nv-nazev').value||'').trim(), aktivni:true
  });
  toast('✓ Stavba přidána');
}

function ciselnikStrojnici(){
  const list = state.strojnici.slice().sort((a,b)=> (a.jmeno||'').localeCompare(b.jmeno||''));
  return `
    <div class="card">
      <h2>Přidat strojníka</h2>
      <input id="np-jmeno" placeholder="Jméno a příjmení">
      <button class="full green" style="margin-top:10px;" onclick="addStrojnik()">+ Přidat strojníka</button>
      <p class="help">Strojník se pak přihlásí výběrem svého jména. PIN je nepovinný.</p>
    </div>
    ${list.map(s=>`
      <div class="list-edit ${s.aktivni===false?'inactive':''}">
        <div class="le-main">
          <div class="le-title">${escapeHtml(s.jmeno)} ${s.role==='admin'?'<span style="color:var(--accent2);font-size:12px;">★</span>':''}</div>
          <div class="le-sub">${s.claimedUid?'přihlášen':'nepřihlášen'}${s.pinHash?' · PIN':''}</div>
        </div>
        <button class="secondary" onclick="setPin('${s.id}')">PIN</button>
        ${s.claimedUid?`<button class="secondary" onclick="unclaim('${s.id}')">Odpojit</button>`:''}
        <button class="secondary" onclick="toggleRole('${s.id}','${s.role||'strojnik'}')">${s.role==='admin'?'➖admin':'➕admin'}</button>
      </div>`).join('')}`;
}
async function addStrojnik(){
  const jmeno=(document.getElementById('np-jmeno').value||'').trim();
  if(jmeno.length<2){ toast('Zadej jméno'); return; }
  await db.collection('strojnici').doc(uid('strojnik')).set({
    jmeno, role:'strojnik', aktivni:true, claimedUid:null, pinHash:null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  toast('✓ Strojník přidán');
}
async function setPin(id){
  const pin = prompt('Nastav 4-místný PIN (prázdné = bez PINu):');
  if(pin==null) return;
  const pinHash = pin.trim()==='' ? null : await sha256(pin.trim());
  await db.collection('strojnici').doc(id).update({ pinHash });
  toast('✓ PIN nastaven');
}
async function unclaim(id){
  if(!confirm('Odpojit zařízení tohoto strojníka?')) return;
  const t = state.strojnici.find(x=>x.id===id);
  if(t && t.claimedUid) await db.collection('uids').doc(t.claimedUid).delete().catch(()=>{});
  await db.collection('strojnici').doc(id).update({ claimedUid:null });
  toast('✓ Odpojeno');
}
async function toggleRole(id, role){
  await db.collection('strojnici').doc(id).update({ role: role==='admin'?'strojnik':'admin' });
  toast('✓ Změněno');
}
async function toggleAktiv(coll, id, makeActive){
  await db.collection(coll).doc(id).update({ aktivni: !!makeActive });
}

/* ════════════════════════════════════════════════════════════════════
   9) START – Firebase init, auth, realtime subscriptions
   ════════════════════════════════════════════════════════════════════ */
function decideStart(){
  if(state.started) return;
  if(!state.loaded.strojnici) return;
  state.started = true;
  state.me = state.strojnici.find(s => s.claimedUid && s.claimedUid===state.uid) || null;
  setRoot(state.me ? 'home' : 'login');
}

function watchAuthState(){
  const prevMeId = state.me ? state.me.id : null;
  state.me = state.strojnici.find(s => s.claimedUid && s.claimedUid===state.uid) || null;
  const meId = state.me ? state.me.id : null;
  if(prevMeId !== meId){
    setRoot(state.me ? 'home' : 'login');
  } else {
    rerender();
  }
}

function startFirebase(){
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
  db.enablePersistence({ synchronizeTabs:true }).catch(()=>{});

  auth.onAuthStateChanged(user => {
    if(!user){ auth.signInAnonymously().catch(e=>{ alert('Přihlášení selhalo: '+e.message); }); return; }
    state.uid = user.uid;
    subscribeAll();
  });
  auth.signInAnonymously().catch(e=>{ console.error(e); });
}

function subscribeAll(){
  if(state._subscribed) return;
  state._subscribed = true;

  db.collection('strojnici').onSnapshot(snap=>{
    state.strojnici = snap.docs.map(d=>({id:d.id, ...d.data()}));
    state.loaded.strojnici = true;
    if(!state.started) decideStart(); else watchAuthState();
  }, err=>console.error('strojnici', err));

  db.collection('stroje').onSnapshot(snap=>{
    state.stroje = snap.docs.map(d=>({id:d.id, ...d.data()}));
    state.loaded.stroje = true; rerender();
  }, err=>console.error('stroje', err));

  db.collection('stavby').onSnapshot(snap=>{
    state.stavby = snap.docs.map(d=>({id:d.id, ...d.data()}));
    state.loaded.stavby = true; rerender();
  }, err=>console.error('stavby', err));

  db.collection('zaznamy').onSnapshot(snap=>{
    state.zaznamy = snap.docs.map(d=>({id:d.id, ...d.data()}));
    state.loaded.zaznamy = true; rerender();
  }, err=>console.error('zaznamy', err));
}

/* ── SW registrace ─────────────────────────────────────── */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

/* ── Start ─────────────────────────────────────────────── */
(function start(){
  if(!FIREBASE_CONFIGURED){ setRoot('setup'); return; }
  startFirebase();
})();
</script>
